<script>

  const firebaseConfig = {
    apiKey: "AIzaSyBkyMCw47sYQb2BBkGMxgfsXppozWw4Cec",
    authDomain: "apin-web.firebaseapp.com",
    projectId: "apin-web"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const db = firebase.firestore();

  const VIP_NAME = "SUMBER MANDIRI PONTIANAK";

  function updateActivity() {

    console.log("UPDATE ACTIVITY JALAN");

    db.collection("aktivitas_vip")
    .doc("SUMBER MANDIRI PONTIANAK")
    .set({

      nama: "SUMBER MANDIRI PONTIANAK",

      last_active:
      firebase.firestore.FieldValue.serverTimestamp()

    })
    .then(()=> {

      console.log("BERHASIL SAVE");

    })
    .catch(err => {

      console.error("GAGAL SAVE", err);

    });

  }

  let unsubscribe = null;
  let detailListener = null;
  let openedTabs = [];
  let activeTab = "";



  function isToday(dateString) {

    const today =
    new Date()
    .toISOString()
    .split("T")[0];

    return dateString === today;

  }


  async function loadData(useDateFilter = true) {

    const dateFilter = document.getElementById("filterDate").value;

    const statusFilter = document.getElementById("filterStatus").value;

    const typeFilter = document.getElementById("filterType").value;

    const keyword = document
        .getElementById("searchBox")
        .value
        .toLowerCase()
        .trim();

    const tbody = document.getElementById("historyBody");

    if (unsubscribe) {
        unsubscribe();
        unsubscribe = null;
    }

    tbody.innerHTML = "";

    unsubscribe = db.collection("invoice")
        .where("nama", "==", "SUMBER MANDIRI PONTIANAK")
        .orderBy("waktu", "desc")
        .onSnapshot(async (snapshot) => {

            console.log("RENDER HISTORY :", snapshot.size);

            let totalDoc = 0;
            let totalPending = 0;
            let totalSebagian = 0;
            let totalProses = 0;
            let totalReady = 0;

            const rows = [];

            for (const doc of snapshot.docs) {

                const d = doc.data();

                const docType = (d.type || "").toLowerCase();

                if (
                    typeFilter !== "all" &&
                    docType !== typeFilter
                ) continue;

                if (
                    keyword &&
                    !(d.invoice || "")
                    .toLowerCase()
                    .includes(keyword)
                ) continue;

                if (
                    useDateFilter &&
                    dateFilter &&
                    !isToday(dateFilter)
                ) {

                    const tanggalDoc =
                        d.waktu
                            ? d.waktu
                                  .toDate()
                                  .toISOString()
                                  .split("T")[0]
                            : "";

                    if (tanggalDoc !== dateFilter)
                        continue;
                }

                const detailSnap = await db
                    .collection("pesanan")
                    .where("invoice", "==", d.invoice)
                    .get();

                let pending = 0;
                let proses = 0;
                let ready = 0;

                detailSnap.forEach(itemDoc => {

                    const status =
                        (itemDoc.data().status || "pending")
                        .toLowerCase();

                    if (status === "pending") {

                        pending++;

                    } else if (status === "proses") {

                        proses++;

                    } else if (status === "ready") {

                        ready++;

                    }

                });

                let finalStatus = "pending";

                if (
                    ready === detailSnap.size &&
                    detailSnap.size > 0
                ) {

                    finalStatus = "ready";

                } else if (
                    pending === detailSnap.size
                ) {

                    finalStatus = "pending";

                } else if (
                    proses === detailSnap.size
                ) {

                    finalStatus = "proses";

                } else {

                    finalStatus = "sebagian";

                }

                if (
                    statusFilter !== "all" &&
                    finalStatus !== statusFilter
                ) continue;

                totalDoc++;

                if (finalStatus === "pending") {

                    totalPending++;

                } else if (finalStatus === "sebagian") {

                    totalSebagian++;

                } else if (finalStatus === "proses") {

                    totalProses++;

                } else if (finalStatus === "ready") {

                    totalReady++;

                }

                const waktu =
                    d.waktu
                        ? d.waktu
                              .toDate()
                              .toLocaleDateString("id-ID")
                        : "-";

  async function lihatFaktur(invoiceId) {

    if (detailListener) {
      detailListener();
    }

    const invoiceDoc =
    await db
    .collection("invoice")
    .doc(invoiceId)
    .get();

    if (!invoiceDoc.exists) {

      alert("Invoice tidak ditemukan");
      return;

    }

    const inv =
    invoiceDoc.data();

    if (inv.nama !== "SUMBER MANDIRI PONTIANAK") {

      alert("Akses ditolak");

      return;

    }

    detailListener =
    db.collection("pesanan")
    .where(
      "invoice",
      "==",
      invoiceId
    )
    .where(
      "nama",
      "==",
      VIP_NAME
    )
    .onSnapshot(async(detailSnap)=> {

      let total = 0;

      let ready = 0;
      let proses = 0;
      let pending = 0;

      let no = 0; // 🔥 DROP DI SINI

      let rows = "";

      detailSnap.forEach(doc => {

        const itemId = doc.id;

        const item = doc.data();

        const deleteRequest =
        item.request_delete === true;

        no++;

        const status =
        (item.status || "pending")
        .toLowerCase();

        let label = "PENDING";

        if (status === "ready") {

          label = "READY";
          ready++;

        } else if (status === "proses") {

          label = "PROSES";
          proses++;

        } else {

          pending++;

        }

        total += item.total || 0;

        rows += `
        <tr>

        <td>${no}</td>

        <td>${item.produk}</td>

        <td>${item.qty}</td>

        <td>${item.satuan}</td>

        <td>
        Rp ${(item.harga || 0).toLocaleString("id-ID")}
        </td>

        <td>
        ${item.diskon || 0}%
        </td>

        <td>
        Rp ${(item.total || 0).toLocaleString("id-ID")}
        </td>

        <td>

        ${
        deleteRequest
        ?
        '<span class="badge badge-delete">DELETE REQUEST</span>':
        label
        }

        </td>

        <td>
        <button
        class="btn-delete-item"
        onclick="
        event.stopPropagation();
        requestDeleteItem(
        '${itemId}',
        '${invoiceId}'
        )
        "
        >
        🗑
        </button>

        </td>

        </tr>

        `;

      });

      const waktu =

      inv.waktu
      ?
      inv.waktu
      .toDate()
      .toLocaleString("id-ID"):
      "-";

      document
      .getElementById("invoice-content")
      .innerHTML = `

      <div class="invoice-box modern-faktur">

      <div class="top-header-flex">

      <div style="
      width:100%;
      text-align:center;
      ">

      <div class="brand-title">

      📄 Detail Dokumen

      </div>

      <div class="erp-doc-info">

      <div>
      <div class="info-label">No Dokumen</div>
      <div class="info-value">${invoiceId}</div>
      </div>

      <div>
      <div class="info-label">Customer</div>
      <div class="info-value">${inv.nama}</div>
      </div>

      <div>
      <div class="info-label">Tanggal</div>
      <div class="info-value">${waktu}</div>
      </div>

      <div>
      <div class="info-label">Jenis</div>
      <div class="info-value">${inv.type.toUpperCase()}</div>
      </div>

      </div>

      </div>

      </div>

      <div class="invoice-table-wrap">

      <table class="invoice-table">

      <thead>

      <tr>

      <th>No</th>
      <th>Nama Barang</th>
      <th>Qty</th>
      <th>Satuan</th>
      <th>Harga</th>
      <th>Diskon</th>
      <th>Total</th>
      <th>Status</th>
      <th>Aksi</th>

      </tr>

      </thead>

      <tbody>

      ${rows}

      </tbody>

      </table>

      </div>

      <div class="invoice-footer">

      <div class="invoice-action">

      <button class="btn"
      onclick="window.print()">
      🖨️ Print
      </button>

      <button class="btn"
      onclick="downloadInvoice()">
      📥 Download
      </button>

      <button class="btn"
      onclick="closeInvoice()">
      ❌ Tutup
      </button>

      <button
      class="btn btn-delete-doc"
      onclick="
      requestDeleteInvoice(
      '${invoiceId}'
      )
      "
      >
      🗑 Request Hapus
      </button>

      </div>

      <div class="erp-total-box">

      <div class="total-item-box">

      <b>Total Item</b>
      <span>${detailSnap.size}</span>

      </div>

      <div class="grand-total-box">

      <b>Grand Total</b>
      <span>
      Rp ${total.toLocaleString("id-ID")}
      </span>

      </div>

      </div>

      </div>

      `;

      document
      .getElementById("main-content")
      .style.display = "none";

      document
      .getElementById("invoice-content")
      .style.display = "block";
    }); // tutup onSnapshot
  }
  
  




  function closeInvoice(){

if(detailListener){
detailListener();
detailListener = null;

activeTab = "history";

  function downloadInvoice() {

    const invoice =
    document.querySelector(".invoice-box");

    if (!invoice) {

      alert("Invoice tidak ditemukan 😭");

      return;

    }

    // 🔥 clone biar bersih
    const clone =
invoice.cloneNode(true);

clone.querySelectorAll(".btn-delete-item")
.forEach(el => el.remove());

const aksiHeader =
clone.querySelector("th:last-child");

if(aksiHeader){
aksiHeader.remove();
}

clone.querySelectorAll("tr")
.forEach(row=>{

const lastCell =
row.querySelector("td:last-child");

if(lastCell){
lastCell.remove();
}

});

    // 🔥 buang tombol
    const actions =
    clone.querySelector(".invoice-action");

    if (actions) {

      actions.remove();

    }

    // 🔥 wrapper khusus PDF
    const wrapper =
    document.createElement("div");

    wrapper.style.padding = "20px";
    wrapper.style.background = "#ffffff";

    wrapper.appendChild(clone);

    document.body.appendChild(wrapper);

    const opt = {

      margin: 0.3,

      filename:
      "invoice-" + Date.now() + ".pdf",

      image: {
        type: "jpeg",
        quality: 1
      },

      html2canvas: {

scale: 2,

useCORS: true,

scrollX: 0,

scrollY: 0,

windowWidth: wrapper.scrollWidth,

windowHeight: wrapper.scrollHeight

},

      jsPDF: {

        unit: "in",

        format: "a4",

        orientation:"portrait"

      },

      pagebreak:{
mode:["css","legacy"]
}

    };

    html2pdf()
    .set(opt)
    .from(wrapper)
    .save()
    .then(() => {

      wrapper.remove();

    });

  }


  async function recalculateInvoice(
    invoiceId
  ) {

    const snap =
    await db
    .collection("pesanan")
    .where(
      "invoice",
      "==",
      invoiceId
    )
    .where(
      "nama",
      "==",
      VIP_NAME
    )
    .get();

    let totalItem = 0;
    let grandTotal = 0;

    snap.forEach(doc => {

      const item =
      doc.data();

      totalItem++;

      grandTotal +=
      item.total || 0;

    });

    if (totalItem === 0) {

      await db
      .collection("invoice")
      .doc(invoiceId)
      .delete();

      closeInvoice();

      loadData();

      return;

    }

    await db
    .collection("invoice")
    .doc(invoiceId)
    .update({

      total_item: totalItem,

      total: grandTotal

    });

  }

  async function requestDeleteInvoice(
    invoiceId
  ) {

    if (
      !confirm(
        "Kirim request hapus dokumen?"
      )
    ) {
      return;
    }

    try {

      console.log("STEP 1");

      await db
      .collection("invoice")
      .doc(invoiceId)
      .set({

        request_delete: true,

        request_delete_at:
        firebase.firestore
        .FieldValue
        .serverTimestamp(),

        request_delete_by: "VIP"

      }, {
        merge: true
      });

      console.log("STEP 2");

      const snap =
      await db
      .collection("pesanan")
      .where(
        "invoice",
        "==",
        invoiceId
      )
      .where(
        "nama",
        "==",
        VIP_NAME
      )
      .get();

      console.log(
        "STEP 3",
        snap.size
      );

      const batch =
      db.batch();

      snap.forEach(doc => {

        batch.update(doc.ref, {

          request_delete: true,

          request_delete_invoice: true,

          request_delete_at:
          firebase.firestore
          .FieldValue
          .serverTimestamp(),

          request_delete_by: "VIP"

        });

      });

      console.log("STEP 4");

      await batch.commit();

      console.log("STEP 5");

      alert(
        "Request hapus berhasil dikirim"
      );

    }
    catch(err) {

      console.error(
        "ERROR DELETE:",
        err
      );

      alert(
        "Gagal mengirim request"
      );

    }

  }

  async function hapusDokumen(
    invoiceId
  ) {

    if (
      !confirm(
        "Hapus seluruh dokumen ini?"
      )
    ) {
      return;
    }

    try {

      const snap =
      await db
      .collection("pesanan")
      .where(
        "invoice",
        "==",
        invoiceId
      )
      .get();

      const batch =
      db.batch();

      snap.forEach(doc => {

        batch.delete(
          doc.ref
        );

      });

      batch.delete(
        db.collection("invoice")
        .doc(invoiceId)
      );

      await batch.commit();

      alert(
        "Dokumen berhasil dihapus"
      );

      closeInvoice();

      loadData();

    }
    catch(err) {

      console.error(err);

      alert(
        "Gagal menghapus dokumen"
      );

    }

  }

  async function hapusItem(
    itemId,
    invoiceId
  ) {

    if (
      !confirm(
        "Hapus item ini?"
      )
    ) {
      return;
    }

    try {

      await db
      .collection("pesanan")
      .doc(itemId)
      .delete();

      await recalculateInvoice(
        invoiceId
      );

      alert(
        "Item berhasil dihapus"
      );

      lihatFaktur(
        invoiceId
      );

      loadData();

    }
    catch(err) {

      console.error(err);

      alert(
        "Gagal menghapus item"
      );

    }

  }

  function openInvoiceTab(invoiceId) {

    const exist =
    openedTabs.find(
      t => t.id === invoiceId
    );

    if (!exist) {

      openedTabs.push({
        id: invoiceId,
        title: invoiceId
      });

    }

    activeTab = invoiceId;

    renderTabs();

    lihatFaktur(invoiceId);

  }




  function renderTabs() {

    const wrap =
    document.getElementById("erp-tabs");

    if (!wrap) return;

    wrap.innerHTML = "";

    openedTabs.forEach(tab => {

      wrap.innerHTML += `

      <div
      class="
      tab
      ${activeTab === tab.id ? "active": ""}
      "
      >

      <span
      onclick="
      switchTab('${tab.id}')
      "
      >

      ${tab.title}

      </span>

      ${
      tab.id !== "history"
      ?
      `
      <span
      style="
      margin-left:8px;
      cursor:pointer;
      color:white;
      font-weight:bold;
      "
      onclick="
      event.stopPropagation();
      closeTab('${tab.id}')
      "
      >
      ✕
      </span>
      `:
      ""
      }

      </div>

      `;

    });

  }

  function closeTab(tabId) {

    openedTabs =
    openedTabs.filter(
      t => t.id !== tabId
    );

    if (activeTab === tabId) {

      activeTab = "history";

      closeInvoice();

    }

    renderTabs();

  }

  function switchTab(tabId) {

    activeTab = tabId;

    renderTabs();

    if (tabId === "history") {

      document
      .getElementById("main-content")
      .style.display = "block";

      document
      .getElementById("invoice-content")
      .style.display = "none";

      return;

    }

    lihatFaktur(tabId);

  }
  
  openedTabs = [
{
id:"history",
title:"History Dokumen"
}
];

activeTab = "history";

renderTabs();
