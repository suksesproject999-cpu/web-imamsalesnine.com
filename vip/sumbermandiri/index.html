--navy:#0f2d6b;
--navy-dark:#081c4f;

--primary:#1976d2;
--primary-hover:#1565c0;

--success:#4caf50;
--warning:#ff9800;
--danger:#f44336;

--bg:#eceff3;
--surface:#ffffff;

--border:#d6dbe3;

--text:#2d3748;
--text-light:#718096;

--shadow:
0 2px 10px rgba(0,0,0,.08);

--radius:10px;

}

body{

margin:0;

font-family:
"Segoe UI",
sans-serif;

background:var(--bg);

color:var(--text);

overflow:hidden;

}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

/* MENU */
.menu-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.menu-bar button,
.menu-bar a {
  background: rgba(255,255,255,0.08);
  border: none;
  padding: 10px 14px;
  border-radius: 12px;
  color: white;
  font-size: 13px;
  text-decoration: none;
}

/* CARD */
.card{

background:white;

border:1px solid var(--border);

border-radius:8px;

padding:20px;

margin:0;

max-width:none;

box-shadow:var(--shadow);

color:var(--text);

}

.card h1{

font-size:28px;

font-weight:600;

margin-bottom:10px;

}

.card p{

  max-width: 550px;

  margin: 0 auto;

  line-height: 1.6;

  font-size: 18px;

}

.badge{

background:#e3f2fd;

color:#1976d2;

padding:6px 12px;

font-size:12px;

border-radius:4px;

}

#live-clock{

  margin-top: 15px;

  opacity: .8;

  font-size: 14px;

}

.announcement-bar{

  margin: 30px auto 0;

  max-width: 550px;

  background: #22c55e;

  padding: 18px;

  border-radius: 999px;

  font-size: 18px;

}

/* SEARCH */
.search-box{

position:relative;

max-width:450px;

}

.search-box input{

width:100%;

height:38px;

padding:0 12px;

border:1px solid #cfd8dc;

border-radius:4px;

font-size:13px;

background:white;

box-sizing:border-box;

}

.dropdown{
  position:absolute;
  top:100%;
  left:0;
  width:100%;
  background:white;
  color:#111;
  border:1px solid #ddd;
  border-radius:8px;
  max-height:250px;
  overflow-y:auto;
  z-index:9999;
}

.dropdown div{

padding:10px 12px;

color:#111;

background:white;

border-bottom:1px solid #eee;

cursor:pointer;

}

.dropdown div:hover{

background:#f3f4f6;

}

/* CART */
#cart-list {
  max-height: 250px;
  overflow-y: auto;
}

.cart-item{

background:white;

border:1px solid var(--border);

border-radius:8px;

padding:12px;

margin-top:10px;

color:var(--text);

}

.cart-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: center;
  flex-wrap: wrap;

.cart-row input {
  width: 60px;
  text-align: center;
}

.cart-row select {

  font-size: 12px;
  background: rgba(0,0,0,0.3);

========================= */

.typing{

  width:8px;

  height:8px;

  border-radius:50%;

}

.typing span:nth-child(2){

  animation-delay:.2s;

}

.typing span:nth-child(3){

  animation-delay:.4s;

}

@keyframes bounce{

  0%,100%{

    opacity:.3;

  50%{

function tambah(i){

cart[i].qty++;

syncCart();

autoSaveDraft();

renderCart();

renderCartERP();

}

function kurang(i){
  if(cart[i].qty>1){ cart[i].qty--; }
  else{ cart.splice(i,1); }
  
  syncCart();
  
  autoSaveDraft();
  
  renderCart();
  
  renderCartERP();
}

function hapus(i){
  cart.splice(i,1);
  
  syncCart();
  
  autoSaveDraft();

  renderCart();
  
  renderCartERP();

  updateTotalERP();
}

function updateSatuan(i,val){

  cart[i].satuan = val;

  renderCartERP();

}

function updateHarga(i,val){

  let v = parseInt(val) || 0;

  cart[i].harga = v;

}

function formatRupiah(angka){
  return "Rp " + (angka || 0).toLocaleString("id-ID");
}

function formatInputRupiah(angka){
  return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function handleHargaInput(el, i){

  // ambil angka murni (hapus titik)
  let angka = el.value.replace(/\D/g, "");

  // simpan ke cart sebagai number
  cart[i].harga = parseInt(angka) || 0;

  // format tampilan
  el.value = formatInputRupiah(angka);
}

function updateQty(i,val){
  let v = parseInt(val);
  if(v>0){
    cart[i].qty = v;
    
    syncCart();
    
    autoSaveDraft();
    
    renderCart();
    renderCartERP();// 🔥 WAJIB
  }
}

async function streamText(
  element,
  text
){

  let current = "";

  for(
    let i = 0;
    i < text.length;
    i++
  ){

    current += text[i];

    element.innerHTML =
    marked.parse(current);

    await new Promise(
      resolve =>
      setTimeout(resolve, 8)
    );

  }

}

  "imamgpt-image.png";

  link.click();

  document.body.removeChild(link);

}

function copyAI(btn){

  const text =

  btn.parentElement
  .parentElement
  .innerText;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied";

  setTimeout(() => {

    btn.innerText = "📋 Copy";

  }, 1500);

}

function openTab(page){

const existing =
openedTabs.find(
t => t.id === page
);

if(!existing){

openedTabs.push({

id: page,

title:
pageTitles[page] || page

});

}

activeTab = page;

renderTabs();

showPage(page);

}

function closeTab(page){

openedTabs =
openedTabs.filter(
tab => tab.id !== page
);

if(activeTab === page){

activeTab =
openedTabs.length
? openedTabs[openedTabs.length - 1].id
: "dashboard";

showPage(activeTab);

}

renderTabs();

}

wrap.innerHTML += `

function updateTotalERP(){

let gross = 0;
let diskon = 0;
let total = 0;

cart.forEach(item=>{

  const hargaAwal =
  (item.harga || 0) * item.qty;

  const nilaiDiskon =
  hargaAwal *
  ((item.diskon || 0) / 100);

  const hargaAkhir =
  hargaAwal - nilaiDiskon;

  gross += hargaAwal;
  diskon += nilaiDiskon;
  total += hargaAkhir;

});

const subTotal =
document.getElementById(
"subTotal"
);

const totalDiskon =
document.getElementById(
"totalDiskon"
);

const grandTotal =
document.getElementById(
"grandTotal"
);

if(subTotal){

  subTotal.innerText =
  formatRupiah(gross);

}

if(totalDiskon){

  totalDiskon.innerText =
  formatRupiah(diskon);

}

if(grandTotal){

  grandTotal.innerText =
  formatRupiah(total);

}

}

function generateOrderInfo(){

  const savedInvoice =
  localStorage.getItem("invoiceNo");

  const savedWaktu =
  localStorage.getItem("waktuOrder");

  if(savedInvoice){

    invoiceNo = savedInvoice;
    waktuOrder = savedWaktu;

    return;
  }

  const now = new Date();

  invoiceNo =
    "SO-" +
    now.getFullYear() +
    String(now.getMonth()+1).padStart(2,"0") +
    String(now.getDate()).padStart(2,"0") +
    "-" +
    Date.now().toString().slice(-4);

  waktuOrder =
    now.toLocaleString("id-ID");

  localStorage.setItem(
    "invoiceNo",
    invoiceNo
  );

  localStorage.setItem(
    "waktuOrder",
    waktuOrder
  );

}

    Date.now().toString().slice(-4);

    now.toLocaleString("id-ID");

  localStorage.setItem(
    "klaimNo",
    klaimNo
  );

  localStorage.setItem(
    "waktuKlaim",
    waktuKlaim
  );

}
