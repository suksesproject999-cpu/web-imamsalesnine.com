.typing{

.typing span:nth-child(2){

.typing span:nth-child(3){

@keyframes bounce{

// ================= UPDATE STATUS =================
async function updateStatus(row,status){

  const card =
  document.querySelector(
    `[data-row='${row}']`
  );

    card.querySelectorAll(".btn")
    .forEach(b=>{

      .classList.add("active-red");

      .classList.add("active-green");

const timerRef = db
    .collection("pengatur_waktu_delete")
    .doc(item.invoice);

// ==========================
// JIKA STATUS = PENDING
// HAPUS TIMER
// ==========================
if (status === "pending") {

    const timerSnap = await timerRef.get();

    if (timerSnap.exists) {

        await timerRef.delete();

        console.log("🗑 Timer dihapus :", item.invoice);

    }

}

// ==========================
// JIKA STATUS = PROSES
// BUAT TIMER
// ==========================
else if (status === "proses") {

    const timerSnap = await timerRef.get();

    if (!timerSnap.exists) {

        await timerRef.set({

            faktur: item.invoice,

            nama: item.nama,

            created_at:
            firebase.firestore.FieldValue.serverTimestamp(),

            hari_kadaluwarsa: 7,

            status: "running"

        });

        console.log("✅ Timer dibuat :", item.invoice);

    }

}

// ==========================
// UPDATE TIMESTAMP INVOICE
// ==========================
await db
.collection("invoice")
.doc(item.invoice)
.update({

    updated_at:
    firebase.firestore.FieldValue.serverTimestamp()

});

}



async function cekPengaturWaktuDelete(){

    const now = new Date();

    const snap = await db
    .collection("pengatur_waktu_delete")
    .where("status","==","running")
    .get();

    for(const doc of snap.docs){

        const data = doc.data();

        if(!data.created_at) continue;

        const mulai = data.created_at.toDate();

        const expired = new Date(mulai);

        expired.setDate(
            expired.getDate() + (data.hari_kadaluwarsa || 7)
        );

        if(now >= expired){

            console.log(
                "Timer habis:",
                data.faktur
            );

            // nanti STEP 3 isi di sini
            const invoiceId = data.faktur;
            
            
            // ===========================
        // CEK DULU INVOICE
        // ===========================
        const invoiceRef = db.collection("invoice").doc(invoiceId);
        const invoiceSnap = await invoiceRef.get();

        if (!invoiceSnap.exists) {

            await doc.ref.update({
                status: "not_found"
            });

            continue;
        }

        const invoiceData = invoiceSnap.data();

        if (invoiceData.request_delete === true) {

            await doc.ref.update({
                status: "finished",
                finished_at: firebase.firestore.FieldValue.serverTimestamp()
            });

            continue;
        }
            
            

// ===========================
// UPDATE INVOICE
// ===========================
await db
.collection("invoice")
.doc(invoiceId)
.set({

    request_delete: true,

    request_delete_at:
    firebase.firestore.FieldValue.serverTimestamp(),

    request_delete_by: "SYSTEM AUTO"

},{
    merge:true
});

// ===========================
// UPDATE SEMUA ITEM PESANAN
// ===========================
const pesananSnap = await db
.collection("pesanan")
.where("invoice","==",invoiceId)
.get();

const batch = db.batch();

pesananSnap.forEach(itemDoc=>{

    batch.update(itemDoc.ref,{

        request_delete:true,

        request_delete_invoice:true,

        request_delete_at:
        firebase.firestore.FieldValue.serverTimestamp(),

        request_delete_by:"SYSTEM AUTO"

    });

});

await batch.commit();

// ===========================
// TIMER SELESAI
// ===========================
await doc.ref.update({

    status:"finished",

    finished_at:
    firebase.firestore.FieldValue.serverTimestamp()

});

console.log(
    "✅ AUTO DELETE REQUEST:",
    invoiceId
);

        }

    }

}

.collection("pesanan")
.orderBy("waktu","desc")

    renderTimer = setTimeout(() => {

        allData = [];

        snapshot.forEach(doc => {

            let item = doc.data();

            const existingCard =
            document.querySelector(
            `[data-row='${doc.id}']`
            );

            if(existingCard){

                const statusText =
                existingCard.querySelector(".status-text");

                if(statusText){

                    item.status === "ready"

                    ? "🟢 READY"

                    :

                    item.status === "proses"

                    ? "🟡 PROSES"

            if(!item.waktu) return;

            if(bulanFilter){

                const bulanData =
                item.waktu
                .toDate()
                .getMonth()+1;

                    return;

        document.getElementById(
        "filterStatus"

// BULK UPDATE
async function bulkUpdate(status){

  let selected =
  getSelected();

  if(selected.length === 0){

    alert(
      "Pilih produk dulu bro 😏"
    );

    return;

  }

  let kosong =
  status === "kosong";

  let namaProduk = [];

  for(const id of selected){

    const ref =
    db.collection("stok")
    .doc(id);

    const snap =
    await ref.get();

    const data =
    snap.data();

    namaProduk.push(
      data.nama
    );

    await ref.update({

      kosong: kosong

    });

  }

  // 🔥 NOTIF WA
  fetch(

    URL +
    "?mode=notifStokBulk" +
    "&status=" +
    status +
    "&produk=" +
    encodeURIComponent(
      JSON.stringify(
        namaProduk
      )
    )

  );

  alert(
    "Bulk update berhasil 😎🔥"
  );

}

function toggleStok(
  id,

  kosong
){

  let newKosong =
  !kosong;

  // 🔥 UPDATE FIREBASE
  db.collection("stok")
  .doc(id)
  .update({

    kosong:newKosong

  });

  // 🔥 STATUS TEXT
  let statusText =
  newKosong
  ? "kosong"
  : "tersedia";

  // 🔥 KIRIM NOTIF WA
  fetch(

    URL +
    "?mode=notifStok" +
    "&produk=" +
    encodeURIComponent(nama) +
    "&status=" +
    statusText

  );

}

async function streamText(
  element,
  text
){

  let current = "";

  for(
    let i = 0;
    i < text.length;
    i++
  ){

    current += text[i];

    element.innerHTML =
    marked.parse(current);

    await new Promise(
      resolve =>
      setTimeout(resolve, 1)
    );

  }

}

function downloadImage(imageSrc){

  const link =
  document.createElement("a");

  link.href = imageSrc;

  link.download =
  "imamgpt-image.png";

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

}

function copyAI(btn){

  const text =

  btn.parentElement
  .parentElement
  .innerText;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied";

  setTimeout(() => {

    btn.innerText = "📋 Copy";

  }, 1500);

}

async function cancelDelete(id){

  const doc = await db
  .collection("pesanan")
  .doc(id)
  .get();

  const data = doc.data();

  if(!data.invoice) return;

  const snap = await db
  .collection("pesanan")
  .where("invoice","==",data.invoice)
  .get();

  let batch = db.batch();

  snap.forEach(d => {

    batch.update(d.ref,{

      request_delete:false,
      request_delete_invoice:false

    });

  });

  await batch.commit();

  // 🔥 HILANGKAN UI LANGSUNG TANPA RENDER
  document.querySelectorAll(
    ".invoice-delete-alert"
  ).forEach(el=>{

    el.remove();

  });

  document.querySelectorAll(
  "[data-row]"
).forEach(card=>{

  const redNotif =
  [...card.querySelectorAll("div")]
  .find(el =>

    el.innerText.includes(
      "VIP REQUEST DELETE"
    )

  );

  if(redNotif){

    redNotif.remove();

  }

  const rejectBtn =
  card.querySelector(
    "button[onclick*='cancelDelete']"
  );

  if(rejectBtn){

    rejectBtn.remove();

  }

});

}

async function approveDeleteInvoice(invoice){

  if(
    !confirm(
      "Terima request delete invoice ini?"
    )
  ) return;

  const invoiceDoc =
await db
.collection("invoice")
.doc(invoice)
.get();

const inv =
invoiceDoc.data();

const snapshot =
await db
.collection("pesanan")
.where(
 "invoice",
 "==",
 invoice
)
.where(
 "nama",
 "==",
 inv.nama
)
.get();

  const batch = db.batch();

  snapshot.forEach(doc=>{

    batch.delete(doc.ref);

  });
  
  batch.delete(
 db.collection("invoice")
 .doc(invoice)
);

  await batch.commit();

  alert(
    "Invoice berhasil dihapus 😎"
  );
   
}

function showPage(pageId, btn){

  document
    .querySelectorAll('.page-section')
    .forEach(page=>{
      page.classList.remove('active');
    });

  document
    .getElementById(pageId)
    .classList.add('active');

  document
    .querySelectorAll('.menu-btn')
    .forEach(b=>{
      b.classList.remove('active');
    });

  if(btn){
    btn.classList.add('active');
  }

  const tabs =
  document.getElementById('top-tabs');

  tabs.innerHTML = '';

  tabsConfig[pageId].forEach((tab,index)=>{

  tabs.innerHTML += `
    <div
      class="erp-tab ${index===0?'active':''}"
      onclick="handleTopTab('${pageId}','${tab}',this)"
    >
      ${tab}
    </div>
  `;

});

  if(pageId==='page-vip'){
    renderVIPControl();
  }
  
}

  'page-dashboard',
  document.querySelector('.menu-btn')
);

function handleTopTab(pageId, tab, el){

  document
  .querySelectorAll('#top-tabs .erp-tab')
  .forEach(t=>t.classList.remove('active'));

  el.classList.add('active');

  // ORDER
  if(pageId === 'page-order'){

    if(tab === 'Semua Order'){
      currentStatusFilter = 'all';
    }

    else if(tab === 'Pending'){
      currentStatusFilter = 'pending';
    }

    else if(tab === 'Proses'){
      currentStatusFilter = 'proses';
    }

    else if(tab === 'Ready'){
      currentStatusFilter = 'ready';
    }

    document.getElementById(
      'filterStatus'
    ).value = currentStatusFilter;

    render();
  }

  // STOK
  if(pageId === 'page-stok'){

    if(tab === 'Produk'){

      document
      .querySelectorAll('.stok-item')
      .forEach(item=>{
        item.style.display='block';
      });

    }

    else if(tab === 'Stok Tersedia'){

      document
      .querySelectorAll('.stok-item')
      .forEach(item=>{

        item.style.display =
        item.dataset.status === 'tersedia'
        ? 'block'
        : 'none';

      });

    }

    else if(tab === 'Stok Kosong'){

      document
      .querySelectorAll('.stok-item')
      .forEach(item=>{

        item.style.display =
        item.dataset.status === 'kosong'
        ? 'block'
        : 'none';

      });

    }

  }

}
